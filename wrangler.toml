name = "hazardpin"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
pages_build_output_dir = ".open-next/assets"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── Production D1 ──
[[d1_databases]]
binding = "DB"
database_name = "hazardpin-db-prod"
database_id = "1ad52409-c67d-4a6e-b95e-6a0e1fa60bc7"

# ── Production KV ──
[[kv_namespaces]]
binding = "KV"
id = "3a64c447738b4c43978c46b123eedbf8"

# ── Production R2 ──
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "hazardpin-images-prod"

# Secrets (set via `wrangler secret put`):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET