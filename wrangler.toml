name = "pothole-patrol"
compatibility_date = "2025-09-01"
main = "workers/index.ts"

# Dev-compatible top-level bindings (used by `wrangler dev` and Pages Functions local)
[[d1_databases]]
binding = "DB"
database_name = "pothole-patrol-db-dev"
database_id = "<dev-d1-id>"

[[kv_namespaces]]
binding = "KV"
id = "<dev-kv-id>"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "pothole-patrol-images-dev"

[[durable_objects.bindings]]
name = "REVIEW_AGGREGATOR"
class_name = "ReviewAggregator"

[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "Leaderboard"

[[migrations]]
tag = "v1"
new_classes = ["ReviewAggregator", "Leaderboard"]

# Secrets (set via `wrangler secret put ...` or .dev.vars)
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET

[vars]
NEXT_PUBLIC_APP_URL = "https://pothole-patrol.pages.dev"
NEXT_PUBLIC_R2_PUBLIC_URL = "https://images.potholepatrol.app"

[[env.production.d1_databases]]
binding = "DB"
database_name = "pothole-patrol-db"
database_id = "<production-d1-id>"

[[env.production.kv_namespaces]]
binding = "KV"
id = "<production-kv-id>"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "pothole-patrol-images"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "pothole-patrol-db-staging"
database_id = "<staging-d1-id>"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "<staging-kv-id>"

[[env.staging.r2_buckets]]
binding = "IMAGES"
bucket_name = "pothole-patrol-images-staging"
