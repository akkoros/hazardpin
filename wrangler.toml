name = "hazardpin"
compatibility_date = "2025-09-01"
main = "workers/index.ts"

# ── Dev bindings (local + remote dev) ──
[[d1_databases]]
binding = "DB"
database_name = "hazardpin-db-dev"
database_id = "834f1f75-af68-44e3-987a-9583b28fb80e"

[[kv_namespaces]]
binding = "KV"
id = "39d15d61e43f474883e403ca84b41e45"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "hazardpin-images-dev"

[[durable_objects.bindings]]
name = "REVIEW_AGGREGATOR"
class_name = "ReviewAggregator"

[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "Leaderboard"

[[migrations]]
tag = "v1"
new_classes = ["ReviewAggregator", "Leaderboard"]

# Secrets (set via `wrangler secret put ...` or .dev.vars)
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET

[vars]
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
NEXT_PUBLIC_R2_PUBLIC_URL = "https://images.hazardpin.dev"